name: Shell Checks

on:
  push:
  pull_request:

jobs:
  syntax-and-source:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Syntax check
        shell: bash
        run: |
          set -euo pipefail
          bash -n install.sh
          bash -n shell/bash/bashrc
          bash -n shell/bash/bash_profile
          bash -n shell/common/*.sh
          bash -n bin/*
          zsh -n shell/zsh/zshrc

      - name: Source configs
        shell: bash
        env:
          DOTFILES: ${{ github.workspace }}
          TERM: xterm-256color
        run: |
          set -euo pipefail
          bash -i -c "source shell/bash/bashrc"
          zsh -i -c "source shell/zsh/zshrc"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck ripgrep
      - name: Run shellcheck
        run: shellcheck $(rg --files -g 'bin/*' -g 'shell/**' -g 'install.sh')
